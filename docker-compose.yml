services:
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: job-assistant-api
    ports:
      - "5053:8080" # .NET 8/10 default port in container is 8080
    volumes:
      - ./Backend/job_assistant.db:/app/job_assistant.db
      - ./Backend/wwwroot/screenshots:/app/wwwroot/screenshots
      - ./Backend/appsettings.json:/app/appsettings.json
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=job_assistant.db

  web:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: job-assistant-web
    ports:
      - "3000:80"
    depends_on:
      - api
